<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Encuesta no disponible — {{workplace.name}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f1f5f9; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 16px; padding: 48px 40px; text-align: center; max-width: 440px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 20px; font-weight: 800; color: #1e293b; margin-bottom: 12px; }
    p { font-size: 14px; color: #64748b; line-height: 1.6; }
    .empresa { font-size: 13px; font-weight: 600; color: #2563eb; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Encuesta no disponible</h1>
    <p>Esta encuesta de clima laboral no está disponible en este momento. Contacta al administrador de tu organización para más información.</p>
    <p class="empresa">{{workplace.name}}</p>
  </div>
</body>
</html>
