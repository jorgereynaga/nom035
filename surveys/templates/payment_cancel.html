{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago cancelado — NormaIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(15,23,42,.08);
            padding: 48px 40px;
            max-width: 460px;
            width: 100%;
            text-align: center;
        }
        .icon-wrap {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #fef2f2;
            border: 2px solid #fecaca;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon-wrap svg { width: 32px; height: 32px; color: #dc2626; }
        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 11px 24px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background .15s, transform .1s;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary {
            background: #4f46e5;
            color: #ffffff;
            border: none;
        }
        .btn-primary:hover { background: #4338ca; }
        .btn-outline {
            background: transparent;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        .btn-outline:hover { background: #f8fafc; }
        .brand {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #4f46e5;
            margin-bottom: 32px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="brand">NormaIA</span>
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </div>
        <h1>Pago cancelado</h1>
        <p>No se realizó ningún cargo. Puedes intentarlo de nuevo cuando quieras.</p>
        <div class="btn-group">
            <a href="{% url 'stripe_planes' %}" class="btn btn-primary">Ver planes</a>
            <a href="{% url 'index' %}" class="btn btn-outline">Ir al Dashboard</a>
        </div>
    </div>
</body>
</html>
