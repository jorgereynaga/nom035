<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — NormaIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #f8f9fc;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Navbar ─────────────────────────────────────────────── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 60px; background: #fff;
      border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; padding: 0 32px;
      z-index: 50;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.1rem; font-weight: 600; color: #0f172a;
      text-decoration: none;
    }
    .logo-badge {
      width: 30px; height: 30px; border-radius: 7px;
      background: rgba(37,99,235,.1);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-ia { font-weight: 800; color: #2563eb; }

    /* ─── Page layout ────────────────────────────────────────── */
    .page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 20px 40px;
    }

    /* ─── Card ───────────────────────────────────────────────── */
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }

    /* ─── Logo / header ──────────────────────────────────────── */
    .card-logo {
      display: flex; justify-content: center; margin-bottom: 24px;
    }
    .card-logo-badge {
      width: 48px; height: 48px; border-radius: 12px;
      background: rgba(37,99,235,.1);
      display: flex; align-items: center; justify-content: center;
    }
    .card-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      color: #0f172a; text-align: center; margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: .9rem; color: #64748b; text-align: center; margin-bottom: 28px;
    }

    /* ─── Alert messages ─────────────────────────────────────── */
    .alert {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 12px 14px;
      font-size: .875rem; color: #b91c1c;
      margin-bottom: 20px; line-height: 1.5;
    }

    /* ─── Form ───────────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: .8125rem; font-weight: 600;
      color: #374151; margin-bottom: 6px;
    }
    .form-control {
      width: 100%; padding: 10px 14px;
      font-size: .9375rem; font-family: 'Inter', sans-serif;
      color: #0f172a; background: #fff;
      border: 1px solid #e2e8f0; border-radius: 8px;
      outline: none; transition: border-color .2s, box-shadow .2s;
      appearance: none;
    }
    .form-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .form-control::placeholder { color: #94a3b8; }

    /* ─── Forgot password ────────────────────────────────────── */
    .forgot-row {
      display: flex; justify-content: flex-end; margin-top: -8px; margin-bottom: 20px;
    }
    .forgot-link {
      font-size: .8125rem; color: #2563eb; font-weight: 500; text-decoration: none;
    }
    .forgot-link:hover { text-decoration: underline; }

    /* ─── Button ─────────────────────────────────────────────── */
    .btn-primary {
      width: 100%; padding: 12px;
      background: #2563eb; color: #fff;
      font-size: .9375rem; font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none; border-radius: 8px; cursor: pointer;
      transition: background .2s;
    }
    .btn-primary:hover { background: #1d4ed8; }

    /* ─── Footer link ────────────────────────────────────────── */
    .card-footer {
      text-align: center; margin-top: 24px;
      font-size: .875rem; color: #64748b;
    }
    .card-footer a { color: #2563eb; font-weight: 600; text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="logo">
      <span class="logo-badge">
        <svg width="18" height="18" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:#2563eb">
          <path d="M10 22V10L22 22V10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="22" cy="10" r="2.5" fill="currentColor"/>
        </svg>
      </span>
      Norma<span class="logo-ia">IA</span>
    </a>
  </nav>

  <!-- Page -->
  <main class="page">
    <div class="card">

      <!-- Logo badge -->
      <div class="card-logo">
        <div class="card-logo-badge">
          <svg width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:#2563eb">
            <path d="M10 22V10L22 22V10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="22" cy="10" r="2.5" fill="currentColor"/>
          </svg>
        </div>
      </div>

      <h1 class="card-title">Bienvenido de vuelta</h1>
      <p class="card-subtitle">Inicia sesión en tu cuenta</p>

      <!-- Django messages -->
      {% if messages %}
        {% for message in messages %}
          <div class="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST" action=".">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label" for="inputEmail">Correo electrónico</label>
          <input
            type="text"
            id="inputEmail"
            name="username"
            class="form-control"
            placeholder="tu@empresa.com"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="inputPassword">Contraseña</label>
          <input
            type="password"
            id="inputPassword"
            name="password"
            class="form-control"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="forgot-row">
          <a href="{% url 'password_recover' %}" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-primary">Iniciar sesión</button>
      </form>

      <p class="card-footer">
        ¿No tienes cuenta? <a href="/newuser/">Regístrate</a>
      </p>
    </div>
  </main>

</body>
</html>
