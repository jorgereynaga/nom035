<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — NormaIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <!-- Toastr -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" />
  <!-- reCAPTCHA v3 -->
  <script src="https://www.google.com/recaptcha/api.js?render=6Le3XCEtAAAAAO-V0M9w9XaNgAtUHFj7TxrMJz0B"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: #f8f9fc;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Navbar ─────────────────────────────────────────────── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 60px; background: #fff;
      border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; padding: 0 32px;
      z-index: 50;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.1rem; font-weight: 600; color: #0f172a;
      text-decoration: none;
    }
    .logo-badge {
      width: 30px; height: 30px; border-radius: 7px;
      background: rgba(37,99,235,.1);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-ia { font-weight: 800; color: #2563eb; }

    /* ─── Page layout ────────────────────────────────────────── */
    .page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 20px 48px;
    }

    /* ─── Card ───────────────────────────────────────────────── */
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }

    /* ─── Logo / header ──────────────────────────────────────── */
    .card-logo {
      display: flex; justify-content: center; margin-bottom: 24px;
    }
    .card-logo-badge {
      width: 48px; height: 48px; border-radius: 12px;
      background: rgba(37,99,235,.1);
      display: flex; align-items: center; justify-content: center;
    }
    .card-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      color: #0f172a; text-align: center; margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: .9rem; color: #64748b; text-align: center; margin-bottom: 28px;
    }

    /* ─── Form ───────────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: .8125rem; font-weight: 600;
      color: #374151; margin-bottom: 6px;
    }
    .form-control {
      width: 100%; padding: 10px 14px;
      font-size: .9375rem; font-family: 'Inter', sans-serif;
      color: #0f172a; background: #fff;
      border: 1px solid #e2e8f0; border-radius: 8px;
      outline: none; transition: border-color .2s, box-shadow .2s;
      appearance: none;
    }
    .form-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .form-control::placeholder { color: #94a3b8; }

    /* ─── Checkbox ───────────────────────────────────────────── */
    .checkbox-row {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 20px; cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] {
      width: 17px; height: 17px; border-radius: 4px;
      border: 1px solid #e2e8f0; cursor: pointer;
      margin-top: 1px; flex-shrink: 0; accent-color: #2563eb;
    }
    .checkbox-label {
      font-size: .8125rem; color: #64748b; line-height: 1.5;
    }
    .checkbox-label a { color: #2563eb; font-weight: 600; text-decoration: none; }
    .checkbox-label a:hover { text-decoration: underline; }

    /* ─── Button ─────────────────────────────────────────────── */
    .btn-primary {
      width: 100%; padding: 12px;
      background: #2563eb; color: #fff;
      font-size: .9375rem; font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none; border-radius: 8px; cursor: pointer;
      transition: background .2s;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ─── reCAPTCHA notice ───────────────────────────────────── */
    .recaptcha-notice {
      font-size: .7rem; color: #94a3b8; text-align: center;
      margin-top: 14px; line-height: 1.5;
    }
    .recaptcha-notice a { color: #2563eb; text-decoration: none; }
    .recaptcha-notice a:hover { text-decoration: underline; }

    /* ─── Footer link ────────────────────────────────────────── */
    .card-footer {
      text-align: center; margin-top: 24px;
      font-size: .875rem; color: #64748b;
    }
    .card-footer a { color: #2563eb; font-weight: 600; text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }

    /* ─── Toastr overrides ───────────────────────────────────── */
    #toast-bottom-right { bottom: 24px !important; right: 24px !important; }
    .toast { border-radius: 10px !important; font-family: 'Inter', sans-serif !important; }

    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="logo">
      <span class="logo-badge">
        <svg width="18" height="18" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:#2563eb">
          <path d="M10 22V10L22 22V10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="22" cy="10" r="2.5" fill="currentColor"/>
        </svg>
      </span>
      Norma<span class="logo-ia">IA</span>
    </a>
  </nav>

  <!-- Page -->
  <main class="page">
    <div class="card">

      <!-- Logo badge -->
      <div class="card-logo">
        <div class="card-logo-badge">
          <svg width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:#2563eb">
            <path d="M10 22V10L22 22V10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="22" cy="10" r="2.5" fill="currentColor"/>
          </svg>
        </div>
      </div>

      <h1 class="card-title">Crear cuenta gratis</h1>
      <p class="card-subtitle">Empieza a cumplir la NOM-035 hoy</p>

      <form id="registerForm">

        <div class="form-group">
          <label class="form-label" for="inputName">Nombre / Razón social</label>
          <input
            type="text"
            id="inputName"
            name="name"
            class="form-control"
            placeholder="Empresa o nombre completo"
            autocomplete="organization"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="inputEmail">Correo electrónico</label>
          <input
            type="email"
            id="inputEmail"
            name="username"
            class="form-control"
            placeholder="tu@empresa.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="inputPhone">Teléfono</label>
          <input
            type="tel"
            id="inputPhone"
            name="phone"
            class="form-control"
            placeholder="+52 55 0000 0000"
            autocomplete="tel"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="inputPassword">Contraseña</label>
          <input
            type="password"
            id="inputPassword"
            name="password1"
            class="form-control"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="inputConfPassword">Confirmar contraseña</label>
          <input
            type="password"
            id="inputConfPassword"
            name="password2"
            class="form-control"
            placeholder="Repite tu contraseña"
            autocomplete="new-password"
            required
          />
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="accept_terms" name="accept_terms" required />
          <span class="checkbox-label">
            Acepto los <a href="/terminos/" target="_blank">términos y condiciones</a> y el <a href="/privacidad/" target="_blank">aviso de privacidad</a>
          </span>
        </label>

        <button type="submit" class="btn-primary" id="submitBtn">Crear cuenta</button>

        <p class="recaptcha-notice">
          Este sitio está protegido por reCAPTCHA. Aplican la
          <a href="https://policies.google.com/privacy" target="_blank">Política de privacidad</a> y los
          <a href="https://policies.google.com/terms" target="_blank">Términos de servicio</a> de Google.
        </p>
      </form>

      <p class="card-footer">
        ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
      </p>
    </div>
  </main>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Toastr -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

  <script>
    toastr.options = {
      positionClass: 'toast-bottom-right',
      containerId: 'toast-bottom-right',
      timeOut: 5000,
      closeButton: true,
      progressBar: true
    };

    $('#registerForm').on('submit', function(e) {
      e.preventDefault();

      if (!$('#accept_terms').is(':checked')) {
        toastr.warning('Aviso', 'Debes aceptar los términos y condiciones.', {
          positionClass: 'toast-bottom-right',
          containerId: 'toast-bottom-right'
        });
        return;
      }

      const $btn = $('#submitBtn');
      $btn.disabled = true;
      $btn.text('Procesando...');

      grecaptcha.ready(function() {
        grecaptcha.execute('6Le3XCEtAAAAAO-V0M9w9XaNgAtUHFj7TxrMJz0B', {action: 'login'}).then(function(token) {
          $.ajax({
            url: "/api/users/",
            method: 'POST',
            contentType: "application/json",
            data: JSON.stringify({
              "name": $("#inputName").val(),
              "username": $("#inputEmail").val(),
              "phone": $("#inputPhone").val(),
              "email": $("#inputEmail").val(),
              "webform": token,
              "password1": $("#inputPassword").val(),
              "password2": $("#inputConfPassword").val(),
            }),
            dataType: 'json',
            success: function(data){
              toastr.success('Correcto','¡Registro exitoso! Iniciando sesión...',{positionClass:'toast-bottom-right',containerId:'toast-bottom-right'});
              $.ajax({
                url: '/api/login/',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({username: $('#inputEmail').val(), password: $('#inputPassword').val()}),
                dataType: 'json',
                success: function(loginData){ location.replace('/stripe/planes/'); },
                error: function(){ location.replace('/login'); }
              });
            },
            error: function(xhr){
              toastr.error('Error', xhr.responseText || 'Ha ocurrido un error', {positionClass:'toast-bottom-right',containerId:'toast-bottom-right'});
              $btn.prop('disabled', false);
              $btn.text('Crear cuenta');
            }
          });
        });
      });
    });
  </script>

</body>
</html>
